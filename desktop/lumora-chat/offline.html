<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; img-src 'self' data:;"
    />
    <title>Lumora Chat is offline</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #05050a;
        color: #f8f8fb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        overflow: hidden;
        background:
          radial-gradient(circle at 16% 10%, rgba(144, 64, 255, 0.17), transparent 34%),
          radial-gradient(circle at 86% 84%, rgba(0, 211, 255, 0.13), transparent 30%),
          #05050a;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        opacity: 0.22;
        pointer-events: none;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px);
        background-size: 48px 48px;
        mask-image: radial-gradient(circle at center, black, transparent 76%);
      }

      main {
        width: min(560px, calc(100vw - 40px));
        padding: 44px;
        border: 1px solid rgba(255, 255, 255, 0.11);
        border-radius: 8px;
        background: rgba(14, 14, 23, 0.82);
        box-shadow: 0 30px 90px rgba(0, 0, 0, 0.55), 0 0 70px rgba(115, 61, 255, 0.1);
        backdrop-filter: blur(24px);
      }

      .mark {
        width: 64px;
        height: 64px;
        display: grid;
        place-items: center;
        margin-bottom: 28px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 8px;
        font-size: 30px;
        font-weight: 900;
        background: linear-gradient(145deg, #943cff, #297cff 55%, #06d6db);
        box-shadow: 0 0 34px rgba(95, 105, 255, 0.34);
      }

      .eyebrow {
        margin: 0 0 12px;
        color: #7eeaf5;
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        max-width: 430px;
        font-size: clamp(32px, 5vw, 52px);
        line-height: 0.98;
        letter-spacing: 0;
      }

      p {
        margin: 20px 0 30px;
        color: #a7a7b5;
        font-size: 16px;
        line-height: 1.7;
      }

      button {
        min-height: 48px;
        padding: 0 24px;
        border: 0;
        border-radius: 7px;
        color: #fff;
        font: inherit;
        font-weight: 800;
        cursor: pointer;
        background: linear-gradient(100deg, #a52cff, #5268ff 54%, #00cfe8);
        box-shadow: 0 14px 38px rgba(72, 88, 255, 0.28);
        transition: transform 160ms ease, box-shadow 160ms ease;
      }

      button:hover {
        transform: translateY(-2px);
        box-shadow: 0 18px 46px rgba(72, 88, 255, 0.38);
      }

      button:active {
        transform: translateY(0);
      }

      #status {
        min-height: 20px;
        margin: 18px 0 0;
        color: #7f7f8d;
        font-size: 13px;
      }

      @media (max-width: 560px) {
        main {
          padding: 30px 24px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark" aria-hidden="true">L</div>
      <p class="eyebrow">Connection interrupted</p>
      <h1>Lumora Chat could not reach the studio.</h1>
      <p>
        Check your connection and try again. Your conversations and desktop session remain safely stored.
      </p>
      <button id="retry" type="button">Try again</button>
      <div id="status" role="status" aria-live="polite"></div>
    </main>
    <script>
      const retry = document.getElementById("retry");
      const status = document.getElementById("status");

      retry.addEventListener("click", async () => {
        retry.disabled = true;
        retry.textContent = "Connecting...";
        status.textContent = "Reconnecting to Lumora.";
        await window.lumoraDesktop.retry();
      });
    </script>
  </body>
</html>
